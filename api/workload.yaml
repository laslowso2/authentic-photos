# Workload descriptor for build-from-source (Phase 3).
# When OpenChoreo builds the image from Git, it generates the Workload CR from THIS file
# (endpoints + env vars come from here, not from a hand-written Workload).
# Must sit at the root of the Component's appPath (i.e. api/workload.yaml).
# Docs: https://openchoreo.dev/docs/developer-guide/workflows/ci/workload-descriptor/
apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: photos-api-workload

endpoints:
  - name: api
    port: 8080
    type: HTTP
    visibility:
      - external          # exposed via the gateway; OAuth added in Phase 4

configurations:
  env:
    - name: PORT
      value: "8080"
    - name: APP_ENV
      value: "development"
    # DB connection (dev). Literal values for now; per-environment wiring comes in Phase 6.
    - name: DB_HOST
      value: "mysql.authentic-photos-data-dev.svc.cluster.local"
    - name: DB_PORT
      value: "3306"
    - name: DB_NAME
      value: "authphotos"
    - name: DB_USER
      value: "authphotos_app"
    - name: DB_PASSWORD
      value: "dev-apppw-change-me"
