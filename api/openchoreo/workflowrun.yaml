# Phase 3: manually trigger a build. The two labels link the build to the Component.
# __GIT_URL__ and __RUN_NAME__ are substituted by deploy-phase3.sh.
apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: __RUN_NAME__
  namespace: default
  labels:
    openchoreo.dev/project: "authentic-photos"
    openchoreo.dev/component: "photos-api"
spec:
  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: "__GIT_URL__"
        revision:
          branch: "main"
        appPath: "/api"
      docker:
        context: "/api"
        filePath: "/api/Dockerfile"
