# Allow the API (running in an OpenChoreo-managed app namespace) to reach MySQL.
# k3s enforces NetworkPolicies, and OpenChoreo isolates project namespaces, so the
# DB side may reject cross-namespace traffic by default. This opens ONLY port 3306
# on the dev DB to pods in any namespace (fine for a local demo).
# Apply this only if the API can't reach the DB (see PHASE2 troubleshooting).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mysql-ingress
  namespace: authentic-photos-data-dev
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}   # any namespace
      ports:
        - protocol: TCP
          port: 3306
