# Two services:
#  - mysql-headless: required by the StatefulSet (stable pod DNS). clusterIP: None.
#  - mysql: the address clients use -> mysql.authentic-photos-data.svc.cluster.local:3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  labels:
    app: mysql
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
