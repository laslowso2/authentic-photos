# PROD database overlay -> namespace authentic-photos-data-prod
# Note: prod gives MySQL more memory headroom than dev/qa (patch below).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authentic-photos-data-prod

resources:
  - namespace.yaml
  - ../../base

secretGenerator:
  - name: mysql-credentials
    literals:
      - MYSQL_ROOT_PASSWORD=prod-rootpw-change-me
      - MYSQL_DATABASE=authphotos
      - MYSQL_USER=authphotos_app
      - MYSQL_PASSWORD=prod-apppw-change-me

generatorOptions:
  disableNameSuffixHash: true

# Example of per-environment infra difference: bump prod resources + storage.
patches:
  - target:
      kind: StatefulSet
      name: mysql
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "5Gi"
