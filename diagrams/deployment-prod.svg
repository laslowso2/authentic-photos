<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1120" viewBox="0 0 1280 1120" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker>
    <marker id="arg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1280" height="1120" fill="#ffffff"/>

  <!-- Header -->
  <text x="40" y="38" font-size="22" font-weight="700" fill="#0f172a">Deployment Diagram — PRODUCTION environment</text>
  <text x="40" y="60" font-size="12.5" fill="#475569">Runtime topology as deployed on local k3d. Names shown as created. Local single-node k3d assumed — verify with `kubectl get nodes`.</text>

  <!-- External subscriber -->
  <rect x="40" y="86" width="250" height="86" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="58" y="116" font-size="14" font-weight="700" fill="#334155">External Subscriber App (prod)</text>
  <text x="58" y="137" font-size="11.5" fill="#475569">OAuth client: photos-subscriber-prod</text>
  <text x="58" y="156" font-size="11.5" fill="#475569">(secret held by prod consumers only)</text>

  <!-- Host device -->
  <rect x="40" y="196" width="1200" height="700" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="40" y="196" width="430" height="26" rx="6" fill="#475569"/>
  <text x="54" y="214" font-size="12.5" font-weight="700" fill="#ffffff">«device» Developer Mac — macOS · Colima VM · Docker</text>

  <!-- k3d cluster -->
  <rect x="62" y="240" width="1156" height="636" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="78" y="262" font-size="12.5" font-weight="700" fill="#334155">«docker network» k3d cluster "openchoreo"</text>

  <!-- serverlb -->
  <rect x="80" y="280" width="210" height="150" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="94" y="303" font-size="11" fill="#475569">«container»</text>
  <text x="94" y="321" font-size="13" font-weight="700" fill="#334155">k3d-...-serverlb</text>
  <text x="94" y="344" font-size="11" fill="#475569">publishes host ports:</text>
  <text x="94" y="366" font-size="11.5" font-weight="700" fill="#0f172a">:8080 → control-plane GW</text>
  <text x="94" y="386" font-size="11.5" font-weight="700" fill="#0f172a">:19080 → data-plane GW</text>
  <text x="94" y="412" font-size="10.5" fill="#475569">(k3d load balancer)</text>

  <!-- K8s node -->
  <rect x="312" y="272" width="892" height="592" rx="12" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <rect x="312" y="272" width="470" height="24" rx="6" fill="#334155"/>
  <text x="326" y="289" font-size="12" font-weight="700" fill="#ffffff">«node» k3d-openchoreo-server-0  (Kubernetes node)</text>

  <!-- ns openchoreo-data-plane -->
  <rect x="330" y="312" width="410" height="112" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.3"/>
  <text x="344" y="332" font-size="11.5" font-weight="700" fill="#334155">ns: openchoreo-data-plane</text>
  <rect x="344" y="342" width="382" height="70" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="356" y="363" font-size="12.5" font-weight="700" fill="#334155">Gateway (kgateway / Envoy)</text>
  <text x="356" y="382" font-size="11" fill="#475569">Deployment: gateway-default</text>
  <text x="356" y="400" font-size="11" fill="#475569">Service: LoadBalancer :19080</text>

  <!-- PROD CELL ns -->
  <rect x="330" y="436" width="530" height="330" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="344" y="456" font-size="11.5" font-weight="700" fill="#3730a3">ns: dp-default-authentic-pho-production   (OpenChoreo Cell)</text>

  <rect x="344" y="466" width="502" height="30" rx="5" fill="#ffffff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="354" y="486" font-size="11" fill="#4338ca">HTTPRoute · host: production-default.openchoreoapis.localhost · /photos-api-api</text>

  <rect x="344" y="502" width="502" height="46" rx="5" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.3"/>
  <text x="354" y="520" font-size="11" font-weight="700" fill="#166534">TrafficPolicy jwtAuth → GatewayExtension (JWT)</text>
  <text x="354" y="538" font-size="10.5" fill="#166534">issuer: Thunder · audience: photos-subscriber-prod · JWKS embedded</text>

  <!-- Deployment + pods -->
  <rect x="344" y="556" width="330" height="150" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="356" y="576" font-size="12.5" font-weight="700" fill="#3730a3">Deployment: photos-api-production</text>
  <text x="356" y="594" font-size="11" fill="#4338ca">replicas = 2 (fixed, from ReleaseBinding)</text>
  <rect x="356" y="604" width="140" height="66" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="366" y="623" font-size="11" font-weight="700" fill="#3730a3">Pod (Node/TS)</text>
  <text x="366" y="640" font-size="10.5" fill="#4338ca">container :8080</text>
  <text x="366" y="656" font-size="10" fill="#4338ca">req 200m/384Mi</text>
  <rect x="512" y="604" width="140" height="66" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="522" y="623" font-size="11" font-weight="700" fill="#3730a3">Pod (Node/TS)</text>
  <text x="522" y="640" font-size="10.5" fill="#4338ca">container :8080</text>
  <text x="522" y="656" font-size="10" fill="#4338ca">lim 500m/512Mi</text>
  <text x="356" y="690" font-size="10.5" fill="#4338ca">env: APP_ENV=production · DB_HOST=…-prod (per ReleaseBinding)</text>

  <!-- Service -->
  <rect x="686" y="556" width="160" height="70" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="698" y="577" font-size="12" font-weight="700" fill="#3730a3">Service</text>
  <text x="698" y="596" font-size="11" fill="#4338ca">photos-api</text>
  <text x="698" y="614" font-size="11" fill="#4338ca">ClusterIP :8080</text>
  <text x="686" y="656" font-size="10.5" fill="#b45309">No HPA in prod —</text>
  <text x="686" y="672" font-size="10.5" fill="#b45309">autoscaling is dev-only</text>
  <text x="686" y="688" font-size="10.5" fill="#b45309">in this build.</text>

  <!-- PROD DB ns -->
  <rect x="878" y="436" width="308" height="330" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="892" y="456" font-size="11.5" font-weight="700" fill="#166534">ns: authentic-photos-data-prod</text>
  <text x="892" y="472" font-size="10.5" fill="#15803d">(pure Kubernetes · kustomize prod overlay)</text>
  <rect x="892" y="482" width="280" height="120" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="904" y="503" font-size="12.5" font-weight="700" fill="#166534">StatefulSet: mysql</text>
  <text x="904" y="522" font-size="11" fill="#15803d">Pod: mysql-0 · MySQL 8.4</text>
  <text x="904" y="540" font-size="11" fill="#15803d">container :3306</text>
  <text x="904" y="558" font-size="11" fill="#15803d">req 512Mi · limit 1Gi (prod)</text>
  <text x="904" y="582" font-size="10.5" fill="#15803d">Services: mysql / mysql-headless :3306</text>
  <rect x="892" y="612" width="135" height="64" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.3"/>
  <text x="902" y="632" font-size="11" font-weight="700" fill="#166534">PVC</text>
  <text x="902" y="650" font-size="10.5" fill="#15803d">data-mysql-0</text>
  <text x="902" y="667" font-size="10.5" fill="#15803d">5Gi (prod)</text>
  <rect x="1037" y="612" width="135" height="64" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.3"/>
  <text x="1047" y="632" font-size="11" font-weight="700" fill="#166534">Secret</text>
  <text x="1047" y="650" font-size="10.5" fill="#15803d">mysql-</text>
  <text x="1047" y="667" font-size="10.5" fill="#15803d">credentials</text>

  <!-- thunder ns -->
  <rect x="330" y="778" width="360" height="76" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="344" y="798" font-size="11.5" font-weight="700" fill="#92400e">ns: thunder   (shared platform)</text>
  <text x="344" y="817" font-size="11" fill="#78350f">Thunder IdP — OAuth2/OIDC · Service :8090</text>
  <text x="344" y="835" font-size="11" fill="#78350f">HTTPRoute: thunder.openchoreo.localhost</text>

  <!-- kube-system ns -->
  <rect x="702" y="778" width="200" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.3"/>
  <text x="716" y="798" font-size="11.5" font-weight="700" fill="#334155">ns: kube-system</text>
  <text x="716" y="817" font-size="11" fill="#475569">metrics-server</text>
  <text x="716" y="835" font-size="11" fill="#475569">coredns</text>

  <!-- control-plane ns -->
  <rect x="914" y="778" width="272" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.3"/>
  <text x="928" y="798" font-size="11.5" font-weight="700" fill="#334155">ns: openchoreo-control-plane</text>
  <text x="928" y="817" font-size="11" fill="#475569">control-plane Gateway :8080 (serves Thunder)</text>
  <text x="928" y="835" font-size="11" fill="#475569">renderedrelease-controller (renders the Cell)</text>

  <!-- ===== arrows ===== -->
  <!-- 1 subscriber -> serverlb :8080 (token) -->
  <path d="M120,172 C120,220 140,250 150,278" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="132" cy="232" r="11" fill="#1e293b"/><text x="132" y="236" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <!-- 2 subscriber -> serverlb :19080 (api) -->
  <path d="M240,172 C240,230 220,250 210,278" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="243" cy="234" r="11" fill="#1e293b"/><text x="243" y="238" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <!-- serverlb -> data-plane gateway :19080 -->
  <line x1="290" y1="378" x2="342" y2="378" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>

  <!-- serverlb -> control-plane gateway :8080 (token path, dashed) -->
  <path d="M200,430 C200,760 500,700 912,812" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arg)"/>

  <!-- 3 gateway enforces + 4 gateway -> service -->
  <path d="M535,412 C535,430 535,440 535,464" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="560" cy="450" r="11" fill="#1e293b"/><text x="560" y="454" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <line x1="674" y1="591" x2="684" y2="591" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="662" cy="576" r="11" fill="#1e293b"/><text x="662" y="580" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>

  <!-- 5 api pod -> mysql :3306 -->
  <path d="M766,591 C820,591 850,560 890,542" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="835" cy="560" r="11" fill="#1e293b"/><text x="835" y="564" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>

  <!-- 6 control-plane renders cell (dashed) -->
  <path d="M1000,778 C980,700 760,640 674,631" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arg)"/>
  <circle cx="812" cy="720" r="11" fill="#64748b"/><text x="812" y="724" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">6</text>

  <!-- Thunder token internal path -->
  <path d="M400,778 C400,760 480,720 520,700" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- ===== legend ===== -->
  <rect x="40" y="912" width="14" height="14" rx="3" fill="#eef2ff" stroke="#6366f1"/><text x="60" y="924" font-size="12" fill="#334155">OpenChoreo Cell (managed)</text>
  <rect x="270" y="912" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#16a34a"/><text x="290" y="924" font-size="12" fill="#334155">Pure Kubernetes</text>
  <rect x="440" y="912" width="14" height="14" rx="3" fill="#fffbeb" stroke="#f59e0b"/><text x="460" y="924" font-size="12" fill="#334155">Shared platform</text>
  <rect x="610" y="912" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#64748b"/><text x="630" y="924" font-size="12" fill="#334155">Infra / external</text>
  <line x1="770" y1="919" x2="800" y2="919" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/><text x="808" y="924" font-size="12" fill="#334155">control / trust (not per-request)</text>

  <!-- ===== flows panel ===== -->
  <rect x="40" y="946" width="1200" height="152" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="56" y="970" font-size="13" font-weight="700" fill="#0f172a">Ports &amp; flows (production)</text>
  <text x="56" y="994" font-size="11.5" fill="#334155"><tspan font-weight="700">1</tspan>  Subscriber → host :8080 → control-plane Gateway → Thunder /oauth2/token → JWT (aud = photos-subscriber-prod)</text>
  <text x="56" y="1016" font-size="11.5" fill="#334155"><tspan font-weight="700">2</tspan>  Subscriber → host :19080 → serverlb → data-plane Gateway (Envoy), Authorization: Bearer JWT, Host: production-default.openchoreoapis.localhost</text>
  <text x="56" y="1038" font-size="11.5" fill="#334155"><tspan font-weight="700">3</tspan>  Gateway enforces TrafficPolicy jwtAuth (issuer + audience checked locally against embedded JWKS) — wrong-env token = 403</text>
  <text x="56" y="1060" font-size="11.5" fill="#334155"><tspan font-weight="700">4</tspan>  Gateway → Service photos-api :8080 → one of 2 pods    ·    <tspan font-weight="700">5</tspan>  API pod → MySQL Service :3306 (cluster DNS; creds from Secret)</text>
  <text x="56" y="1082" font-size="11.5" fill="#334155"><tspan font-weight="700">6</tspan>  Control plane: renderedrelease-controller renders the Cell's Deployment/Service/HTTPRoute from the prod ReleaseBinding (replicas=2, DB=prod)</text>
</svg>
