apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: __RUN_NAME__
  namespace: default
  labels:
    openchoreo.dev/project: "authentic-photos"
    openchoreo.dev/component: "photos-web"
spec:
  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: "__GIT_URL__"
        revision:
          branch: "main"
        appPath: "/web"
      docker:
        context: "/web"
        filePath: "/web/Dockerfile"
